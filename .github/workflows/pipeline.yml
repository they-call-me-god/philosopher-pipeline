name: Philosopher Pipeline

on:
  schedule:
    - cron: "0 2 * * 1"   # Every Monday at 2am UTC
  workflow_dispatch:        # Allow manual trigger from GitHub UI

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install system dependencies (ffmpeg + yt-dlp)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
          pip install yt-dlp

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Restore audio cache
        uses: actions/cache@v4
        with:
          path: cache/audio
          key: audio-cache-${{ runner.os }}
          restore-keys: audio-cache-

      - name: Restore photo cache
        uses: actions/cache@v4
        with:
          path: cache/photos
          key: photo-cache-${{ runner.os }}
          restore-keys: photo-cache-

      - name: Restore state
        uses: actions/cache@v4
        with:
          path: state.json
          key: state-${{ github.run_number }}
          restore-keys: state-

      - name: Restore Instagram session
        run: |
          echo "${{ secrets.INSTAGRAM_SESSION }}" | base64 -d > session.json
        continue-on-error: true

      - name: Download fonts
        run: |
          mkdir -p fonts
          curl -sL "https://github.com/google/fonts/raw/main/ofl/playfairdisplay/PlayfairDisplay%5Bwght%5D.ttf" \
            -o fonts/PlayfairDisplay-Regular.ttf

      - name: Write vault input files
        run: |
          cat > philosophers.md << 'EOF'
          - Albert Camus
          - Fyodor Dostoevsky
          - Franz Kafka
          - Voltaire
          - Friedrich Nietzsche
          - Simone de Beauvoir
          - Søren Kierkegaard
          - Arthur Schopenhauer
          - Marcus Aurelius
          - Immanuel Kant
          - Jean-Paul Sartre
          - Blaise Pascal
          EOF
          cp ${{ github.workspace }}/../songs.md songs.md 2>/dev/null || true

      - name: Write songs file
        run: |
          cat > songs.md << 'SONGS'
          - https://www.youtube.com/watch?v=ao4RCon11eY  # Dark phonk drift, atmospheric, existential, crushing
          - https://www.youtube.com/watch?v=W9xfRFDlZBk  # Dark phonk aggressive, cowbell-driven, menacing, dominant
          - https://www.youtube.com/watch?v=4hgyFPpfzgY  # Drift phonk, cinematic tension, dark, relentless
          - https://www.youtube.com/watch?v=eFqUUlQSsbo  # Dark phonk, aggressive, relentless, dominant
          - https://www.youtube.com/watch?v=LLtWpwzwotM  # Slowed reverb trap, heavy, crushing, sorrowful, nocturnal
          - https://www.youtube.com/watch?v=qV2uAK-SACI  # Slowed trap, ominous, heavy, nocturnal, brooding
          - https://www.youtube.com/watch?v=mfGPNnYAVgI  # Slowed aesthetic, melancholic, cinematic drift, ethereal
          - https://www.youtube.com/watch?v=9vfKuNRbOaQ  # Slowed reverb, haunting, sorrowful, spiritual decay
          - https://www.youtube.com/watch?v=UceaB4D0jpo  # Slowed lofi trap, nostalgic, contemplative, drifting
          - https://www.youtube.com/watch?v=AswXiy8JCsI  # Hypnotic dark ambient, cinematic, eerie, cold void
          - https://www.youtube.com/watch?v=kvHvxKHYMBA  # Mysterious dark cinematic, haunting, ominous, desert noir
          - https://www.youtube.com/watch?v=_Xm1hmB0KCg  # Hypnotic eerie ambient, transformative, nocturnal, surreal
          - https://www.youtube.com/watch?v=NS9z2QHcZdY  # Cold cinematic orchestral, transformative, atmospheric, epic
          - https://www.youtube.com/watch?v=1rC9Wh4-RfQ  # Ethereal indie, nostalgic, cinematic, spiritual longing
          - https://www.youtube.com/watch?v=4N3N1MlvVc4  # Ethereal lofi, contemplative, soft, nostalgic warmth
          - https://www.youtube.com/watch?v=EkHTsc9PU2A  # Melancholic atmospheric, sorrowful, emotional, drifting
          - https://www.youtube.com/watch?v=5qap5aO4i9A  # Lofi hip hop, chill, contemplative, study focus
          - https://www.youtube.com/watch?v=jfKfPfyJRdk  # Lofi beats, nostalgic, soft, peaceful afternoons
          - https://www.youtube.com/watch?v=OVh0bMNSFss  # Lofi phonk hybrid, contemplative, quirky, late night
          - https://www.youtube.com/watch?v=_mUCHoX9bEE  # Emotional piano, sorrowful, spiritual, ethereal
          - https://www.youtube.com/watch?v=XqZsoesa55w  # Soft sad piano, nostalgic, emotional, contemplative
          - https://www.youtube.com/watch?v=NS8DPG62Fto  # Cold spare piano, mechanical, stoic grief, minimal
          - https://www.youtube.com/watch?v=iFOtmUxEGTY  # Eerie ambient piano, surreal, anxious, cold spiritual
          SONGS

      - name: Run pipeline
        env:
          INSTAGRAM_USERNAME: ${{ secrets.INSTAGRAM_USERNAME }}
          INSTAGRAM_PASSWORD: ${{ secrets.INSTAGRAM_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python pipeline.py --now

      - name: Save updated Instagram session
        if: always()
        run: |
          if [ -f session.json ]; then
            SESSION_B64=$(base64 -w 0 session.json)
            echo "SESSION_B64=$SESSION_B64" >> $GITHUB_OUTPUT
          fi
        id: save-session

      - name: Save updated state cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: state.json
          key: state-${{ github.run_number }}

